services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules          # 호스트 node_modules 격리
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    # Windows Docker 볼륨 환경에서 inotify 미지원 → polling 방식 사용
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
